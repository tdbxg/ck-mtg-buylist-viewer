name: Update Card Kingdom buylist

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * *"

permissions:
  contents: write

concurrency:
  group: update-card-kingdom-buylist
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh static data
        run: python scripts/update_site_data.py

      - name: Validate generated files
        run: |
          python - <<'PY'
          import gzip, json
          from pathlib import Path

          required = [
              Path("data.json.gz"),
              Path("data_fast.json.gz"),
              Path("movers.json"),
              Path("last_update.json"),
              Path("exports/ck_buylist_top5000.csv"),
              Path("exports/ck_buylist_fast_high_recent.csv"),
              Path("exports/ck_buylist_full.csv.gz"),
              Path("exports/manifest.json"),
          ]
          for path in required:
              if not path.exists() or path.stat().st_size <= 0:
                  raise SystemExit(f"missing or empty: {path}")

          with gzip.open("data.json.gz", "rt", encoding="utf-8") as f:
              payload = json.load(f)
          meta = payload.get("meta", {})
          if meta.get("cards", 0) < 100000:
              raise SystemExit(f"unexpected card count: {meta.get('cards')}")
          if not meta.get("cardKingdomCreatedAt"):
              raise SystemExit("missing Card Kingdom timestamp")

          with gzip.open("data_fast.json.gz", "rt", encoding="utf-8") as f:
              fast = json.load(f)
          if fast.get("meta", {}).get("fullCards", 0) < 100000:
              raise SystemExit("fast payload missing fullCards")

          with open("movers.json", "r", encoding="utf-8") as f:
              movers = json.load(f)
          if not movers.get("daily") or not movers.get("weekly"):
              raise SystemExit("movers payload missing daily or weekly sections")
          if "changedRows" not in movers["daily"] or "changedRows" not in movers["weekly"]:
              raise SystemExit("movers payload missing changedRows")

          print(json.dumps(meta, ensure_ascii=False, indent=2))
          PY

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json.gz data_fast.json.gz movers.json last_update.json exports/ck_buylist_top5000.csv exports/ck_buylist_fast_high_recent.csv exports/ck_buylist_full.csv.gz exports/manifest.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update Card Kingdom MTG buylist data"
            git push
          fi
