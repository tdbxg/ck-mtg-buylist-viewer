<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MTG 回收价与欧洲市场参考价</title>
  <link rel="stylesheet" href="./styles.css?v=20260710-filters">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>MTG 回收价与欧洲市场参考价</h1>
      <p id="metaLine">正在载入数据...</p>
    </div>
    <div class="summary" aria-label="summary">
      <div><span id="cardCount">-</span><small>单卡</small></div>
      <div><span id="sealedCount">-</span><small>密封</small></div>
      <div><span id="rate">-</span><small>USD/CNY</small></div>
    </div>
  </header>

  <main class="layout">
    <aside class="filters" aria-label="filters">
      <div class="field search-field">
        <label for="searchInput">搜索</label>
        <input id="searchInput" type="search" placeholder="中文、英文、系列、SKU">
      </div>

      <div class="field fast-field">
        <label>加载模式</label>
        <button id="fullDataButton" type="button">加载全量低价牌</button>
        <div id="fastModeNotice" class="hint">快速版：先加载高价牌和最近系列，打开更快。</div>
      </div>

      <div class="field image-field">
        <label for="imageInput">图片识别搜索</label>
        <div id="imageDropZone" class="drop-zone">
          <input id="imageInput" type="file" accept="image/*">
          <span>点击选择，或把牌图拖到这里</span>
        </div>
        <input id="imageGuessInput" type="search" placeholder="OCR失败时，可在这里输入/粘贴牌名">
        <button id="imageGuessButton" type="button">按这个牌名搜索</button>
        <div id="imageOcrStatus" class="hint">会在浏览器内 OCR 识别英文牌名并搜索；正面清晰图效果最好。也可以把图片拖到页面任意位置。</div>
      </div>

      <div class="field">
        <label for="typeSelect">类型</label>
        <select id="typeSelect">
          <option value="cards">单卡</option>
          <option value="sealed">密封产品</option>
        </select>
      </div>

      <div class="field" id="categoryField">
        <label for="categorySelect">分拣分类</label>
        <select id="categorySelect">
          <option value="">全部分类</option>
          <option value="standard">常规系列</option>
          <option value="promo">Promo / 奖闪</option>
          <option value="secret">Secret Lair</option>
          <option value="list">Mystery Booster / The List</option>
          <option value="ub">Universes Beyond / 联动</option>
          <option value="commander">Commander</option>
          <option value="token">Token / Helper / Oversized</option>
        </select>
      </div>

      <div class="field" id="rarityField">
        <label for="raritySelect">稀有度</label>
        <select id="raritySelect">
          <option value="">全部稀有度</option>
          <option value="bulk">银铁 common/uncommon</option>
          <option value="common">铁 common</option>
          <option value="uncommon">银 uncommon</option>
          <option value="rare">rare</option>
          <option value="mythic">mythic</option>
        </select>
      </div>

      <div class="field recent-field" id="recentSetsField">
        <label>最近系列单卡</label>
        <div id="recentSets" class="set-chips" aria-label="recent sets"></div>
      </div>

      <div class="field" id="setField">
        <label for="setSelect">系列（按发行时间）</label>
        <select id="setSelect">
          <option value="">全部系列</option>
        </select>
      </div>

      <div class="field" id="editionField">
        <label for="editionSelect">CK版本</label>
        <select id="editionSelect">
          <option value="">全部CK版本</option>
        </select>
      </div>

      <div class="field">
        <label for="minPrice">最低回收价（美元）</label>
        <input id="minPrice" type="number" min="0" step="1" value="0">
      </div>

      <div class="checks">
        <label><input id="foilOnly" type="checkbox"> 只看闪卡</label>
        <label><input id="nonfoilOnly" type="checkbox"> 只看平卡</label>
        <label><input id="inactiveOnly" type="checkbox"> 只看不收购</label>
        <label><input id="withImageOnly" type="checkbox"> 只看有图片</label>
        <label><input id="missingCnOnly" type="checkbox"> 只看未匹配中文</label>
      </div>

      <div class="field">
        <label for="sortSelect">排序</label>
        <select id="sortSelect">
          <option value="cashDesc">回收价从高到低</option>
          <option value="cashAsc">回收价从低到高</option>
          <option value="qtyDesc">收购数量从高到低</option>
          <option value="euDesc">欧洲参考价从高到低</option>
          <option value="spreadDesc">CK/欧洲价差从高到低</option>
          <option value="nameAsc">英文名 A-Z</option>
          <option value="editionAsc">版本 A-Z</option>
        </select>
      </div>

      <button id="resetButton" type="button">重置筛选</button>
    </aside>

    <section class="cart-panel" aria-label="buylist cart">
      <div class="cart-head">
        <div>
          <h2>回收车</h2>
          <p id="cartSummary">0 种 / 0 张 / 现金 $0.00 / 积分 $0.00</p>
        </div>
        <div class="cart-actions">
          <button id="exportCartButton" type="button">导出牌表 CSV</button>
          <button id="clearCartButton" type="button">清空</button>
        </div>
      </div>
      <div id="cartTableWrap" class="cart-table-wrap">
        <table class="cart-table">
          <thead>
            <tr>
              <th>牌名</th>
              <th>版本</th>
              <th>编号</th>
              <th>数量</th>
              <th>现金</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="cartRows"></tbody>
        </table>
      </div>
      <div id="cartEmpty" class="cart-empty">还没有加入回收车</div>
    </section>

    <section class="bulk-panel" aria-label="bulk buylist import">
      <div class="bulk-head">
        <div>
          <h2>批量录入</h2>
          <p id="bulkSummary">支持每行一张：数量 + 牌名，或直接粘贴 CK SKU。</p>
        </div>
        <div class="bulk-actions">
          <button id="bulkMatchButton" type="button">匹配</button>
          <button id="bulkAddButton" type="button" disabled>加入回收车</button>
          <button id="bulkClearButton" type="button">清空</button>
        </div>
      </div>
      <div class="multi-photo">
        <div class="multi-controls">
          <label for="multiImageInput">多卡照片录入</label>
          <input id="multiImageInput" type="file" accept="image/*">
          <select id="multiGridSelect">
            <option value="3x3">9张 / 3×3</option>
            <option value="3x4">12张 / 3×4</option>
          </select>
          <button id="multiOcrButton" type="button">识别照片</button>
        </div>
        <div id="multiOcrStatus" class="hint">把 9-12 张牌摆成规则网格，底部系列代码和编号尽量清楚；识别后会进入下面批量匹配。</div>
      </div>
      <textarea id="bulkInput" rows="6" spellcheck="false" placeholder="4 Lightning Bolt&#10;2 SLD-1467&#10;Black Lotus&#10;Roaming Throne | The Lost Caverns of Ixalan | 258"></textarea>
      <div id="bulkResult" class="bulk-result" hidden></div>
    </section>

    <section class="results">
      <div class="resultbar">
        <div>
          <strong id="resultCount">0</strong>
          <span>条结果</span>
        </div>
        <div class="pager">
          <button id="prevButton" type="button" aria-label="上一页">‹</button>
          <span id="pageLine">1 / 1</span>
          <button id="nextButton" type="button" aria-label="下一页">›</button>
        </div>
      </div>

      <div id="cardsGrid" class="cards-grid"></div>
      <div id="emptyState" class="empty" hidden>没有符合条件的条目</div>
    </section>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="thumb">
        <img loading="lazy" alt="">
      </div>
      <div class="card-main">
        <div class="name-row">
          <h2></h2>
          <span class="badge"></span>
        </div>
        <p class="cn"></p>
        <div class="details"></div>
        <div class="prices"></div>
        <div class="links"></div>
      </div>
    </article>
  </template>

  <script src="./app.js?v=20260710-filters"></script>
</body>
</html>
